[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "failsafe-ai"
version = "0.1.0"
description = "AI Failure Intelligence Platform - Track, classify, and learn from AI agent failures"
requires-python = ">=3.9"
license = "Apache-2.0"
authors = [
    { name = "FailSafe Contributors" },
]
keywords = ["ai", "failures", "monitoring", "observability", "agents", "llm"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Software Development :: Quality Assurance",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.0,<3.0",
]

[project.optional-dependencies]
crewai = ["crewai>=0.28.0"]
langchain = ["langchain-core>=0.1.0"]
openai = ["openai>=1.0.0"]
all = [
    "crewai>=0.28.0",
    "langchain-core>=0.1.0",
    "openai>=1.0.0",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[project.urls]
Homepage = "https://github.com/failsafe-ai/failsafe"
Repository = "https://github.com/failsafe-ai/failsafe"
Documentation = "https://failsafe.dev"
Issues = "https://github.com/failsafe-ai/failsafe/issues"

[tool.hatch.build.targets.wheel]
packages = ["failsafe"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.hatch.build.targets.sdist]
include = ["failsafe/**/*.py", "pyproject.toml"]
